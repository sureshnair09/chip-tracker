name: Daily Semiconductor Trend Scan

on:
  schedule:
    # Runs Monday through Friday at 21:05 UTC (4:05 PM EST, right after market close)
    - cron: '5 21 * * 1-5'
  workflow_dispatch: # Allows you to manually trigger the run with a button click anytime

jobs:
  run-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants the server permission to save the updated HTML back to your repo

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Trend Script
      run: python script.py

    - name: Commit and Push Updated Dashboard
      run: |
        git config --global user.name "GitHub Actions Automation"
        git config --global user.email "actions@github.com"
        # Check if index.html actually changed to avoid empty commit errors
        if [[ -n "$(git status --porcelain index.html)" ]]; then
          git add index.html
          git commit -m "Automated Cloud Scan: $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        else
          echo "No trend changes detected today. Skipping commit."
        fi
